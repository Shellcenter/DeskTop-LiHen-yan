<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>离恨烟桌宠</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script>
      window.onerror = function(msg, url, line) {
        try { localStorage.setItem('pet_error', JSON.stringify({msg,url,line,time:Date.now()})) } catch(e) {}
      }
    </script>
  </head>
  <body>
    <div id="app-root" class="app-root">
      <div id="menu-backdrop" class="menu-backdrop hidden" aria-hidden="true"></div>

      <div id="pet-stage" class="pet-stage">
        <div id="pet-wrap" class="pet-wrap">
          <img
            id="pet-image"
            class="pet-asset"
            src="/character/idle.png"
            alt="离恨烟"
            draggable="false"
          />

          <div id="bubble" class="bubble hidden">
            <span id="bubble-text"></span>
            <div class="bubble-arrow"></div>
          </div>
        </div>
      </div>

      <div id="menu-slot" class="menu-slot">
        <nav id="menu" class="menu hidden" aria-label="桌宠菜单">
          <button type="button" class="menu-item" data-action="dashboard">
            <span class="menu-icon">&#9881;</span>
            仪表盘
          </button>
          <button type="button" class="menu-item" data-action="say-hi">
            <span class="menu-icon">&#9995;</span>
            打招呼
          </button>
          <button type="button" class="menu-item" data-action="check-status">
            <span class="menu-icon">&#9679;</span>
            Claude 状态
          </button>
          <button type="button" class="menu-item" data-action="start-claude">
            <span class="menu-icon">&#9654;</span>
            启动 Claude
          </button>
          <button type="button" class="menu-item menu-item-muted" data-action="close-menu">
            <span class="menu-icon">&#10005;</span>
            关闭菜单
          </button>
          <button type="button" class="menu-item menu-item-danger" data-action="quit">
            <span class="menu-icon">&#9211;</span>
            退出桌宠
          </button>
        </nav>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
